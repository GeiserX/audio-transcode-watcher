<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2D1B4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A148C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C4DFF;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#B388FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E040FB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C4DFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50" />
    <line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="150" x2="900" y2="150" />
  </g>

  <!-- Audio waveform bars (left side) -->
  <g transform="translate(60, 100)" opacity="0.9">
    <rect x="0" y="-18" width="5" height="36" rx="2.5" fill="url(#accentGrad)" opacity="0.5" />
    <rect x="10" y="-30" width="5" height="60" rx="2.5" fill="url(#accentGrad)" opacity="0.6" />
    <rect x="20" y="-45" width="5" height="90" rx="2.5" fill="url(#accentGrad)" opacity="0.7" />
    <rect x="30" y="-55" width="5" height="110" rx="2.5" fill="url(#accentGrad)" opacity="0.85" />
    <rect x="40" y="-38" width="5" height="76" rx="2.5" fill="url(#accentGrad)" opacity="0.75" />
    <rect x="50" y="-60" width="5" height="120" rx="2.5" fill="url(#accentGrad)" opacity="0.9" />
    <rect x="60" y="-42" width="5" height="84" rx="2.5" fill="url(#accentGrad)" opacity="0.8" />
    <rect x="70" y="-52" width="5" height="104" rx="2.5" fill="url(#accentGrad)" opacity="0.85" />
    <rect x="80" y="-28" width="5" height="56" rx="2.5" fill="url(#accentGrad)" opacity="0.65" />
    <rect x="90" y="-35" width="5" height="70" rx="2.5" fill="url(#accentGrad)" opacity="0.7" />
    <rect x="100" y="-20" width="5" height="40" rx="2.5" fill="url(#accentGrad)" opacity="0.55" />
    <rect x="110" y="-12" width="5" height="24" rx="2.5" fill="url(#accentGrad)" opacity="0.45" />
  </g>

  <!-- Audio waveform bars (right side, mirrored) -->
  <g transform="translate(710, 100)" opacity="0.9">
    <rect x="0" y="-12" width="5" height="24" rx="2.5" fill="url(#accentGrad)" opacity="0.45" />
    <rect x="10" y="-20" width="5" height="40" rx="2.5" fill="url(#accentGrad)" opacity="0.55" />
    <rect x="20" y="-35" width="5" height="70" rx="2.5" fill="url(#accentGrad)" opacity="0.7" />
    <rect x="30" y="-28" width="5" height="56" rx="2.5" fill="url(#accentGrad)" opacity="0.65" />
    <rect x="40" y="-52" width="5" height="104" rx="2.5" fill="url(#accentGrad)" opacity="0.85" />
    <rect x="50" y="-42" width="5" height="84" rx="2.5" fill="url(#accentGrad)" opacity="0.8" />
    <rect x="60" y="-60" width="5" height="120" rx="2.5" fill="url(#accentGrad)" opacity="0.9" />
    <rect x="70" y="-38" width="5" height="76" rx="2.5" fill="url(#accentGrad)" opacity="0.75" />
    <rect x="80" y="-55" width="5" height="110" rx="2.5" fill="url(#accentGrad)" opacity="0.85" />
    <rect x="90" y="-45" width="5" height="90" rx="2.5" fill="url(#accentGrad)" opacity="0.7" />
    <rect x="100" y="-30" width="5" height="60" rx="2.5" fill="url(#accentGrad)" opacity="0.6" />
    <rect x="110" y="-18" width="5" height="36" rx="2.5" fill="url(#accentGrad)" opacity="0.5" />
  </g>

  <!-- Sine wave decoration across the middle background -->
  <path d="M0,100 Q75,60 150,100 T300,100 T450,100 T600,100 T750,100 T900,100"
        fill="none" stroke="url(#waveGrad)" stroke-width="1.5" opacity="0.3" />
  <path d="M0,100 Q75,140 150,100 T300,100 T450,100 T600,100 T750,100 T900,100"
        fill="none" stroke="url(#waveGrad)" stroke-width="1.5" opacity="0.2" />

  <!-- Title text -->
  <text x="450" y="90" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="1">
    audio-transcode-watcher
  </text>

  <!-- Subtitle -->
  <text x="450" y="125" text-anchor="middle" fill="#B388FF" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="400" letter-spacing="2">
    Automated multi-format audio transcoding service
  </text>

  <!-- Format tags -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600">
    <rect x="265" y="142" width="48" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="289" y="157" text-anchor="middle" fill="#D1C4E9">FLAC</text>

    <rect x="323" y="142" width="48" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="347" y="157" text-anchor="middle" fill="#D1C4E9">ALAC</text>

    <rect x="381" y="142" width="42" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="402" y="157" text-anchor="middle" fill="#D1C4E9">AAC</text>

    <rect x="433" y="142" width="42" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="454" y="157" text-anchor="middle" fill="#D1C4E9">MP3</text>

    <rect x="485" y="142" width="50" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="510" y="157" text-anchor="middle" fill="#D1C4E9">Opus</text>

    <rect x="545" y="142" width="46" height="22" rx="4" fill="#7C4DFF" opacity="0.3" />
    <text x="568" y="157" text-anchor="middle" fill="#D1C4E9">WAV</text>
  </g>
</svg>
