<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="50%" style="stop-color:#2D1B4E"/>
      <stop offset="100%" style="stop-color:#6B4C9A"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  <!-- Proper beamed eighth notes -->
  <g transform="translate(58,108)" fill="#E0B0FF" opacity="0.95">
    <!-- Left notehead - tilted oval -->
    <ellipse cx="0" cy="28" rx="14" ry="10" transform="rotate(-25,0,28)"/>
    <!-- Left stem -->
    <rect x="12" y="-30" width="4.5" height="58" rx="1"/>
    <!-- Right notehead - tilted oval -->
    <ellipse cx="46" cy="20" rx="14" ry="10" transform="rotate(-25,46,20)"/>
    <!-- Right stem -->
    <rect x="58" y="-38" width="4.5" height="58" rx="1"/>
    <!-- Beam connecting stems at top -->
    <polygon points="12,-30 62.5,-38 62.5,-30 12,-22"/>
  </g>
  <!-- Waveform bars (right side) - varying heights for visual rhythm -->
  <g transform="translate(158,128)" stroke="#E0B0FF" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55">
    <line x1="0" y1="-14" x2="0" y2="14"/>
    <line x1="16" y1="-30" x2="16" y2="30"/>
    <line x1="32" y1="-10" x2="32" y2="10"/>
    <line x1="48" y1="-24" x2="48" y2="24"/>
    <line x1="64" y1="-18" x2="64" y2="18"/>
  </g>
</svg>
